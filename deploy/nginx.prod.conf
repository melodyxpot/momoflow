# MomoFlow production reverse proxy
# Two hostnames, TLS via Let's Encrypt (webroot challenge served from certbot-www).

upstream momoflow_api { server api:4000 keepalive 64; }
upstream momoflow_web { server web:3000 keepalive 32; }

# ─── HTTP → HTTPS (and ACME challenge) ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name momolink.io app.momolink.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── momolink.io  →  short-link redirects + REST API ─────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name momolink.io;

    ssl_certificate     /etc/letsencrypt/live/momolink.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/momolink.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Redirect path should be fast.
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;

    location / {
        proxy_pass         http://momoflow_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

# ─── app.momolink.io  →  Next.js dashboard ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.momolink.io;

    ssl_certificate     /etc/letsencrypt/live/momolink.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/momolink.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://momoflow_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}
