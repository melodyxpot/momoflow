# MomoLinks reverse proxy example.
# Replace short.example.com / app.example.com with your domains.

upstream momolinks_api  { server 127.0.0.1:4000 keepalive 64; }
upstream momolinks_web  { server 127.0.0.1:3000 keepalive 32; }

# Short-link domain — talks directly to the redirect engine.
server {
    listen 80;
    server_name short.example.com;

    # Aggressive timeouts; the redirect path should be fast.
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;

    location / {
        proxy_pass         http://momolinks_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

# Dashboard / web app.
server {
    listen 80;
    server_name app.example.com;

    location /api/ {
        proxy_pass         http://momolinks_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://momolinks_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}
