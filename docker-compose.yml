version: "3.9"

# Dev / local stack. Reads the single root .env file.
# For production use docker-compose.prod.yml.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      # Point at the containerised stores, overriding any localhost values
      # the host might have in .env.
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/momoflow
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_SHORT_DOMAIN: ${NEXT_PUBLIC_SHORT_DOMAIN:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

volumes:
  mongo_data:
  redis_data:
